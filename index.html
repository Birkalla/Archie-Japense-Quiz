<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Archie's Japanese Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4ff;
    --card: #ffffff;
    --primary: #4f46e5;
    --primary-light: #eef2ff;
    --primary-dark: #3730a3;
    --success: #059669;
    --success-light: #d1fae5;
    --danger: #dc2626;
    --danger-light: #fee2e2;
    --warning: #d97706;
    --warning-light: #fef3c7;
    --text: #1e1b4b;
    --text-muted: #6b7280;
    --border: #e5e7eb;
    --shadow: 0 4px 20px rgba(79,70,229,0.10);
    --radius: 18px;
    --radius-sm: 12px;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: -webkit-fill-available;
    padding: 0;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--primary);
    color: white;
    padding: 20px 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(79,70,229,0.25);
  }
  .header-title { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; }
  .header-sub { font-size: 13px; opacity: 0.8; margin-top: 2px; }
  .score-chips { display: flex; gap: 8px; }
  .chip {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
  }
  .chip.green { background: rgba(5,150,105,0.8); }
  .chip.red { background: rgba(220,38,38,0.7); }

  /* ── Mode tabs ── */
  .modes {
    display: flex;
    gap: 0;
    background: white;
    border-bottom: 1.5px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .modes::-webkit-scrollbar { display: none; }
  .mode-btn {
    flex: 1;
    min-width: 80px;
    padding: 13px 8px 11px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .mode-btn.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
  }
  .mode-icon { font-size: 18px; display: block; margin-bottom: 2px; }

  /* ── Progress bar ── */
  .progress-wrap { background: white; padding: 10px 24px; border-bottom: 1px solid var(--border); }
  .progress-track { background: #e5e7eb; border-radius: 99px; height: 8px; overflow: hidden; }
  .progress-fill {
    background: linear-gradient(90deg, var(--primary), #818cf8);
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-label { font-size: 12px; color: var(--text-muted); margin-top: 5px; text-align: right; }

  /* ── Main content ── */
  .main { padding: 20px 20px 100px; max-width: 640px; margin: 0 auto; }

  /* ── Quiz card ── */
  .quiz-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 24px 24px;
    margin-bottom: 16px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .prompt-lang {
    display: inline-block;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--primary);
    background: var(--primary-light);
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 12px;
  }
  .prompt-word {
    font-size: 34px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .prompt-hint {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  /* ── Text input ── */
  .answer-input {
    width: 100%;
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 600;
    padding: 14px 18px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    background: #f9fafb;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }
  .answer-input:focus { border-color: var(--primary); background: white; }
  .answer-input.correct { border-color: var(--success); background: var(--success-light); }
  .answer-input.wrong { border-color: var(--danger); background: var(--danger-light); }

  /* ── Feedback ── */
  .feedback {
    min-height: 28px;
    margin-top: 12px;
    font-size: 15px;
    font-weight: 700;
    border-radius: var(--radius-sm);
    padding: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .feedback.show { opacity: 1; padding: 10px 14px; }
  .feedback.correct { color: var(--success); background: var(--success-light); }
  .feedback.wrong { color: var(--danger); background: var(--danger-light); }

  /* ── Buttons ── */
  .btn-row { display: flex; gap: 10px; margin-top: 16px; }
  .btn {
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    padding: 14px 24px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    background: var(--primary);
    color: white;
    flex: 1;
    box-shadow: 0 4px 12px rgba(79,70,229,0.3);
  }
  .btn.secondary {
    background: var(--border);
    color: var(--text-muted);
  }
  .btn.got-it {
    background: var(--success);
    color: white;
    flex: 1;
    box-shadow: 0 4px 12px rgba(5,150,105,0.3);
  }
  .btn.missed {
    background: #f3f4f6;
    color: var(--text-muted);
    flex: 1;
    border: 2px solid var(--border);
  }

  /* ── Multiple choice ── */
  .mc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
  .mc-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 16px 12px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    background: #f9fafb;
    color: var(--text);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    line-height: 1.3;
    -webkit-tap-highlight-color: transparent;
  }
  .mc-btn:active { transform: scale(0.97); }
  .mc-btn.correct { background: var(--success-light); border-color: var(--success); color: var(--success); }
  .mc-btn.wrong { background: var(--danger-light); border-color: var(--danger); color: var(--danger); }
  .mc-btn:disabled { cursor: default; }

  /* ── Speak button ── */
  .speak-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 10px 18px;
    border-radius: 99px;
    border: 2px solid var(--primary-light);
    background: var(--primary-light);
    color: var(--primary);
    cursor: pointer;
    margin-bottom: 18px;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .speak-btn:active { transform: scale(0.95); }
  .speak-btn.speaking { background: var(--primary); color: white; border-color: var(--primary); }
  .speak-btn .speaker-icon { font-size: 20px; }

  /* ── Flashcard ── */
  .flashcard-wrap { perspective: 800px; margin-bottom: 16px; }
  .flashcard {
    width: 100%;
    min-height: 220px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
    cursor: pointer;
    border-radius: var(--radius);
  }
  .flashcard.flipped { transform: rotateY(180deg); }
  .fc-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    box-shadow: var(--shadow);
  }
  .fc-front { background: white; border: 2px solid var(--border); }
  .fc-back { background: var(--primary); transform: rotateY(180deg); }
  .fc-label { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px; }
  .fc-front .fc-label { color: var(--primary); }
  .fc-back .fc-label { color: rgba(255,255,255,0.7); }
  .fc-word { font-size: 32px; font-weight: 800; text-align: center; line-height: 1.2; }
  .fc-front .fc-word { color: var(--text); }
  .fc-back .fc-word { color: white; }
  .fc-tap { font-size: 13px; color: var(--text-muted); margin-top: 14px; }
  .fc-back .fc-tap { color: rgba(255,255,255,0.6); }

  /* ── Summary ── */
  .summary-card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 40px 24px;
    text-align: center;
    animation: slideUp 0.3s ease;
  }
  .summary-emoji { font-size: 56px; margin-bottom: 12px; }
  .summary-pct { font-size: 64px; font-weight: 800; color: var(--primary); line-height: 1; }
  .summary-sub { font-size: 17px; color: var(--text-muted); margin: 8px 0 24px; }
  .summary-msg { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 28px; }
  .summary-breakdown {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .breakdown-pill {
    padding: 8px 18px;
    border-radius: 99px;
    font-size: 14px;
    font-weight: 700;
  }
  .breakdown-pill.c { background: var(--success-light); color: var(--success); }
  .breakdown-pill.w { background: var(--danger-light); color: var(--danger); }

  /* ── Flashcard direction toggle ── */
  .fc-direction {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 14px;
  }
  .fc-dir-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 7px 16px;
    border-radius: 99px;
    border: 2px solid var(--border);
    background: white;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .fc-dir-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
  }

  /* ── Answer reveal ── */
  .answer-reveal {
    display: none;
    margin-top: 12px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-weight: 700;
    animation: slideUp 0.2s ease;
  }
  .answer-reveal.correct { background: var(--success-light); color: var(--success); border: 2px solid var(--success); }
  .answer-reveal.wrong { background: var(--danger-light); color: var(--danger); border: 2px solid var(--danger); }
  .answer-reveal.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">🇯🇵 Archie's Japanese Quiz</div>
    <div class="header-sub" id="header-sub">39 words to master</div>
  </div>
  <div class="score-chips">
    <div class="chip green" id="chip-correct">✓ 0</div>
    <div class="chip red" id="chip-wrong">✗ 0</div>
  </div>
</div>

<div class="modes">
  <button class="mode-btn active" onclick="setMode('type-jp',this)">
    <span class="mode-icon">⌨️</span>Type JP
  </button>
  <button class="mode-btn" onclick="setMode('type-en',this)">
    <span class="mode-icon">🔤</span>Type EN
  </button>
  <button class="mode-btn" onclick="setMode('mc',this)">
    <span class="mode-icon">🎯</span>4 Choices
  </button>
  <button class="mode-btn" onclick="setMode('flashcard',this)">
    <span class="mode-icon">🃏</span>Flashcards
  </button>
</div>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="progress-label" id="prog-label">Question 1 of 39</div>
</div>

<div class="main" id="main-area"></div>

<script>
const vocab = [
  {jp:"Mamorimashou",en:"Let's protect"},
  {jp:"Keshimashou",en:"Let's turn off / erase"},
  {jp:"Doushite",en:"Why?"},
  {jp:"To omoimasu",en:"I think"},
  {jp:"Taisetsu",en:"Important"},
  {jp:"Arimasen",en:"There is not / do not have"},
  {jp:"Desu",en:"Is / am / are"},
  {jp:"Demo",en:"But"},
  {jp:"Kame",en:"Turtle"},
  {jp:"Kudasai",en:"Please"},
  {jp:"Ookii",en:"Big"},
  {jp:"Moenai",en:"Non-burnable"},
  {jp:"Arimasu",en:"There is / there are"},
  {jp:"Chiisai",en:"Small"},
  {jp:"Moeru",en:"Burnable"},
  {jp:"Mottainai",en:"What a waste"},
  {jp:"Mizu",en:"Water"},
  {jp:"Umi",en:"Sea / ocean"},
  {jp:"Kankyou",en:"Environment"},
  {jp:"Kitanai",en:"Dirty"},
  {jp:"Kami",en:"Paper"},
  {jp:"Chikyuu",en:"Earth"},
  {jp:"Gomi",en:"Rubbish / garbage"},
  {jp:"Purasuchikku",en:"Plastic"},
  {jp:"Dame",en:"Bad / not allowed"},
  {jp:"Mondai",en:"Problem"},
  {jp:"Denki",en:"Electricity"},
  {jp:"Sodaigomi",en:"Large rubbish / bulky waste"},
  {jp:"Tabenokoshi",en:"Leftover food"},
  {jp:"Bin",en:"Bottle / bin"},
  {jp:"Yoku nai",en:"Not good"},
  {jp:"Dokodemo",en:"Anywhere"},
  {jp:"Kouen",en:"Park"},
  {jp:"Gomibako",en:"Rubbish bin / trash can"},
  {jp:"Ooi",en:"Many / a lot"},
  {jp:"Sukunai",en:"Few / not many"},
  {jp:"Sutenaide",en:"Please don't throw away"},
  {jp:"Tsukawanai de",en:"Please don't use"},
  {jp:"Tsukurimashou",en:"Let's make / let's create"},
];

let mode = 'type-jp';
let fcDirection = 'en-jp'; // 'en-jp' or 'jp-en'
let shuffled = [];
let idx = 0;
let correct = 0;
let wrong = 0;
let answered = false;

function setFCDirection(dir, btn) {
  fcDirection = dir;
  document.querySelectorAll('.fc-dir-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  restart();
}

function restart() {
  shuffled = shuffle(vocab);
  idx = 0; correct = 0; wrong = 0; answered = false;
  updateUI();
  render();
}

function updateUI() {
  document.getElementById('chip-correct').textContent = '✓ ' + correct;
  document.getElementById('chip-wrong').textContent = '✗ ' + wrong;
  const pct = shuffled.length ? Math.round((idx / shuffled.length) * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = 'Question ' + Math.min(idx + 1, shuffled.length) + ' of ' + shuffled.length;
  document.getElementById('header-sub').textContent = shuffled.length + ' words to master';
}

function normalize(s) {
  return s.toLowerCase().replace(/[\/\-\.]/g,' ').replace(/\s+/g,' ').trim();
}

// Romaji → rough Japanese pronunciation map for Web Speech API
const romajiToKana = {
  "Mamorimashou":"まもりましょう","Keshimashou":"けしましょう","Doushite":"どうして",
  "To omoimasu":"とおもいます","Taisetsu":"たいせつ","Arimasen":"ありません",
  "Desu":"です","Demo":"でも","Kame":"かめ","Kudasai":"ください","Ookii":"おおきい",
  "Moenai":"もえない","Arimasu":"あります","Chiisai":"ちいさい","Moeru":"もえる",
  "Mottainai":"もったいない","Mizu":"みず","Umi":"うみ","Kankyou":"かんきょう",
  "Kitanai":"きたない","Kami":"かみ","Chikyuu":"ちきゅう","Gomi":"ごみ",
  "Purasuchikku":"プラスチック","Dame":"だめ","Mondai":"もんだい","Denki":"でんき",
  "Sodaigomi":"そだいごみ","Tabenokoshi":"たべのこし","Bin":"びん","Yoku nai":"よくない",
  "Dokodemo":"どこでも","Kouen":"こうえん","Gomibako":"ごみばこ","Ooi":"おおい",
  "Sukunai":"すくない","Sutenaide":"すてないで","Tsukawanai de":"つかわないで",
  "Tsukurimashou":"つくりましょう"
};

function speakJapanese(romaji) {
  const kana = romajiToKana[romaji] || romaji;
  const btn = document.getElementById('speak-btn');

  // Try Web Speech API first (works locally and on some hosted sites)
  if (window.speechSynthesis) {
    const voices = speechSynthesis.getVoices();
    const jaVoice = voices.find(v => v.lang.startsWith('ja'));
    if (jaVoice || voices.length === 0) {
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(kana);
      utt.lang = 'ja-JP';
      utt.rate = 0.85;
      utt.pitch = 1.1;
      if (jaVoice) utt.voice = jaVoice;
      if (btn) { btn.classList.add('speaking'); btn.innerHTML = '🔊 Speaking...'; }
      utt.onend = () => {
        const b = document.getElementById('speak-btn');
        if (b) { b.classList.remove('speaking'); b.innerHTML = '<span class="speaker-icon">🔊</span> Hear it in Japanese'; }
      };
      utt.onerror = () => playViaTTS(kana);
      speechSynthesis.speak(utt);
      return;
    }
  }
  playViaTTS(kana);
}

function playViaTTS(kana) {
  const btn = document.getElementById('speak-btn');
  if (btn) { btn.classList.add('speaking'); btn.innerHTML = '🔊 Speaking...'; }
  // Use Google Translate TTS endpoint
  const url = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(kana)}&tl=ja&client=tw-ob`;
  const audio = new Audio(url);
  audio.onended = () => {
    const b = document.getElementById('speak-btn');
    if (b) { b.classList.remove('speaking'); b.innerHTML = '<span class="speaker-icon">🔊</span> Hear it in Japanese'; }
  };
  audio.onerror = () => {
    const b = document.getElementById('speak-btn');
    if (b) { b.classList.remove('speaking'); b.innerHTML = '<span class="speaker-icon">🔊</span> Hear it in Japanese'; }
    alert('Audio not available. Try opening the page in Safari on your iPad.');
  };
  audio.play().catch(() => {
    const b = document.getElementById('speak-btn');
    if (b) { b.classList.remove('speaking'); b.innerHTML = '<span class="speaker-icon">🔊</span> Hear it in Japanese'; }
  });
}

function checkTyped() {
  if (answered) { advanceNext(); return; }
  const input = document.getElementById('typed-answer');
  const val = normalize(input.value);
  if (!val) return;
  const item = shuffled[idx];
  const answer = mode === 'type-jp' ? item.jp : item.en;
  const alts = answer.split('/').map(a => normalize(a.trim()));
  const ok = alts.some(a => val === a) || normalize(answer) === val;
  const fb = document.getElementById('feedback');
  fb.classList.add('show');
  if (ok) {
    correct++;
    input.classList.add('correct');
    fb.className = 'feedback show correct';
    fb.innerHTML = '✓ Correct! &nbsp;<span style="font-weight:400">' + answer + '</span>';
  } else {
    wrong++;
    input.classList.add('wrong');
    fb.className = 'feedback show wrong';
    fb.innerHTML = '✗ The answer was: &nbsp;<span style="font-weight:400">' + answer + '</span>';
  }
  answered = true;
  updateUI();
  document.getElementById('check-btn').textContent = 'Next →';
}

function advanceNext() {
  idx++;
  if (idx >= shuffled.length) { renderSummary(); return; }
  answered = false;
  updateUI();
  render();
}

function checkMC(el, chosen, ans, ansEn) {
  if (answered) return;
  answered = true;
  const reveal = document.getElementById('mc-reveal');
  const nextRow = document.getElementById('mc-next');
  if (chosen === ans) {
    correct++;
    el.classList.add('correct');
    if (reveal) {
      reveal.className = 'answer-reveal correct show';
      reveal.innerHTML = '✓ Correct! &nbsp;<span style="font-weight:400">' + ans + ' = ' + ansEn + '</span>';
    }
  } else {
    wrong++;
    el.classList.add('wrong');
    document.querySelectorAll('.mc-btn').forEach(b => {
      if (b.dataset.val === ans) b.classList.add('correct');
    });
    if (reveal) {
      reveal.className = 'answer-reveal wrong show';
      reveal.innerHTML = '✗ The answer was: &nbsp;<span style="font-weight:400">' + ans + ' = ' + ansEn + '</span>';
    }
  }
  document.querySelectorAll('.mc-btn').forEach(b => b.disabled = true);
  if (nextRow) nextRow.style.display = 'flex';
  updateUI();
}

function markFC(got) {
  if (got) correct++; else wrong++;
  idx++;
  if (idx >= shuffled.length) { renderSummary(); return; }
  updateUI();
  render();
}

function flipCard() {
  document.getElementById('fc').classList.toggle('flipped');
}

function render() {
  if (idx >= shuffled.length) { renderSummary(); return; }
  const item = shuffled[idx];
  const area = document.getElementById('main-area');

  if (mode === 'flashcard') {
    area.innerHTML = `
      <div class="flashcard-wrap">
        <div class="flashcard" id="fc" onclick="flipCard()">
          <div class="fc-face fc-front">
            <div class="fc-label">English</div>
            <div class="fc-word">${item.en}</div>
            <div class="fc-tap">Tap to flip 👆</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-label">Japanese (romaji)</div>
            <div class="fc-word">${item.jp}</div>
            <div class="fc-tap">Did you get it?</div>
          </div>
        </div>
      </div>
      <div style="text-align:center; margin-bottom:4px;">
        <button class="speak-btn" id="speak-btn" onclick="speakJapanese('${item.jp.replace(/'/g,"\\'")}')">
          <span class="speaker-icon">🔊</span> Hear it in Japanese
        </button>
      </div>
      <div class="btn-row">
        <button class="btn missed" onclick="markFC(false)">😅 Missed it</button>
        <button class="btn got-it" onclick="markFC(true)">🎉 Got it!</button>
      </div>`;
    return;
  }

  if (mode === 'mc') {
    const others = shuffle(vocab.filter(v => v !== item)).slice(0, 3);
    const opts = shuffle([item, ...others]);
    const btnHtml = opts.map(o =>
      `<button class="mc-btn" data-val="${o.jp}" onclick="checkMC(this,'${o.jp.replace(/'/g,"\\'")}','${item.jp.replace(/'/g,"\\'")}')">
        ${o.jp}
      </button>`).join('');
    area.innerHTML = `
      <div class="quiz-card">
        <div class="prompt-lang">English → Japanese</div>
        <div class="prompt-word">${item.en}</div>
        <button class="speak-btn" id="speak-btn" onclick="speakJapanese('${item.jp.replace(/'/g,"\\'")}')">
          <span class="speaker-icon">🔊</span> Hear it in Japanese
        </button>
        <div class="prompt-hint">Choose the correct Japanese word</div>
        <div class="mc-grid">${btnHtml}</div>
      </div>`;
    return;
  }

  const promptWord = mode === 'type-jp' ? item.en : item.jp;
  const promptLang = mode === 'type-jp' ? 'English → Japanese' : 'Japanese → English';
  const placeholder = mode === 'type-jp' ? 'Type romaji...' : 'Type meaning...';
  area.innerHTML = `
    <div class="quiz-card">
      <div class="prompt-lang">${promptLang}</div>
      <div class="prompt-word">${promptWord}</div>
      <button class="speak-btn" id="speak-btn" onclick="speakJapanese('${item.jp.replace(/'/g,"\\'")}')">
        <span class="speaker-icon">🔊</span> Hear it in Japanese
      </button>
      <input class="answer-input" id="typed-answer" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="${placeholder}" />
      <div class="feedback" id="feedback"></div>
      <div class="btn-row">
        <button class="btn secondary" onclick="advanceNext()">Skip</button>
        <button class="btn primary" id="check-btn" onclick="checkTyped()">Check ✓</button>
      </div>
    </div>`;

  const inp = document.getElementById('typed-answer');
  inp.focus();
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') checkTyped(); });
}

function renderSummary() {
  const pct = Math.round((correct / shuffled.length) * 100);
  const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🌟' : pct >= 50 ? '💪' : '📚';
  const msg = pct >= 90 ? 'Incredible work, Archie!' : pct >= 70 ? 'Great effort — you\'re getting it!' : pct >= 50 ? 'Good start — keep practising!' : 'Keep going, you\'ve got this!';
  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-label').textContent = 'Complete!';
  document.getElementById('main-area').innerHTML = `
    <div class="summary-card">
      <div class="summary-emoji">${emoji}</div>
      <div class="summary-pct">${pct}%</div>
      <div class="summary-sub">${correct} correct out of ${shuffled.length}</div>
      <div class="summary-breakdown">
        <div class="breakdown-pill c">✓ ${correct} correct</div>
        <div class="breakdown-pill w">✗ ${wrong} wrong</div>
      </div>
      <div class="summary-msg">${msg}</div>
      <button class="btn primary" style="width:100%; font-size:18px; padding:16px;" onclick="restart()">Try again 🔄</button>
    </div>`;
}

restart();
</script>
</body>
</html>
